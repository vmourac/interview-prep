name: Publish Interview Prep Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build static site
        run: python3 site/build.py

      - name: Verify publish artifact is sanitized
        run: |
          if grep -RInE 'raw/|wiki/|outputs/|BEGIN [A-Z ]*PRIVATE KEY|AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY|ghp_[A-Za-z0-9_]+|github_pat_|sk-[A-Za-z0-9]|xox[baprs]-|password[[:space:]]*=|passwd[[:space:]]*=|secret[[:space:]]*=|api[_-]?key[[:space:]]*=' public; then
            echo "Refusing to publish private marker or secret-looking content."
            exit 1
          fi

      - name: Publish gh-pages branch
        run: |
          cd public
          touch .nojekyll
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "deploy: publish interview prep site"
          git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push --force origin gh-pages
